            align-items:center;
            position: fixed;
            top: 0;
            left: 0;

        .main-loader {
            height: 150px;
            width: 230px;
            display: inline-flex;
            align-items: center;

            position: relative;

        .main-loader .main-loader-header {

            font-size: 14px;
            position: absolute;
            bottom: -5px;
            color: #929fb7;
        }

        .main-loader-cog svg {
            fill: #3479b7;
            animation: 1.5s linear rotateWithBoost infinite;
        }

        @keyframes spinBasic {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes spinBasicReverse {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(-360deg);
            }
        }

        @keyframes rotateWithBoost {
            0% {
                transform: rotate(0deg);
            }
            60% {
                transform: rotate(180deg);
            }
            90%,
            100% {
                transform: rotate(360deg);
            }
        }
