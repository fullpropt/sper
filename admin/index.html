<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Painel Administrativo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #5568d3;
        }
        .bypass-btn {
            margin-top: 10px;
            background: #28a745;
        }
        .bypass-btn:hover {
            background: #218838;
        }
        .info {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 5px;
            font-size: 14px;
            color: #666;
        }
        .info strong {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🔐 Painel Admin</h1>
        <form id="loginForm">
            <div class="form-group">
                <label>Usuário</label>
                <input type="text" id="username" value="admin" required>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="password" value="admin123" required>
            </div>
            <button type="submit">Entrar</button>
            <button type="button" class="bypass-btn" onclick="bypassLogin()">🔓 Acesso Direto (Bypass)</button>
        </form>
        <div class="info">
            <strong>Dica:</strong> Clique em "Acesso Direto" para entrar instantaneamente como administrador.
        </div>
    </div>

    <script>
        // Verifica se já está logado
        if (localStorage.getItem('admin_session')) {
            window.location.href = 'editor/index.html';
        }

        // Login normal
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            doLogin();
        });

        function doLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Qualquer credencial funciona (para demonstração)
            localStorage.setItem('admin_session', 'session_' + Date.now());
            localStorage.setItem('admin_user', username);
            
            alert('✅ Login realizado com sucesso!');
            window.location.href = 'editor/index.html';
        }

        // Bypass direto
        function bypassLogin() {
            localStorage.setItem('admin_session', 'bypass_' + Date.now());
            localStorage.setItem('admin_user', 'admin');
            localStorage.setItem('is_admin', 'true');
            
            console.log('[Admin] Bypass ativado');
            window.location.href = 'editor/index.html';
        }
    </script>
</body>
</html>
