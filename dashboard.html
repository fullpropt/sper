<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📊 Dashboard</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f7fa;
      color: #111827;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 18px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .header h1 { margin: 0; font-size: 18px; }
    .header button {
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.35);
      color: #fff;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 22px; }
    .nav { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 18px; }
    .nav a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      background: #fff;
      color: #334155;
      text-decoration: none;
      font-weight: 700;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.05);
    }
    .card h3 { margin: 0 0 8px; font-size: 14px; color: #0f172a; }
    .muted { color: #64748b; font-size: 13px; line-height: 1.4; }
    .big { font-size: 28px; font-weight: 900; color: #111827; }
  </style>
</head>
<body>
  <div class="header">
    <h1>📊 Dashboard</h1>
    <button id="logoutBtn">Sair</button>
  </div>

  <div class="container">
    <div class="nav">
      <a href="services.html">🛒 Serviços</a>
      <a href="blog.html">📰 Blog</a>
      <a href="index.html">🔐 Login</a>
      <a href="admin/index.html">🔒 Admin</a>
    </div>

    <div class="grid">
      <div class="card">
        <h3>✅ Sessão</h3>
        <div class="big" id="sessionState">OK</div>
        <div class="muted" id="sessionId"></div>
      </div>
      <div class="card">
        <h3>📦 Pedidos</h3>
        <div class="big">0</div>
        <div class="muted">Template estático (sem backend).</div>
      </div>
      <div class="card">
        <h3>💳 Pagamentos</h3>
        <div class="big">—</div>
        <div class="muted">Sem gateway conectado neste template.</div>
      </div>
    </div>
  </div>

  <script src="railway_405_fix.js"></script>
  <script>
    const session = localStorage.getItem('user_session');
    if (!session) {
      window.location.href = 'index.html';
    } else {
      document.getElementById('sessionId').textContent = session;
    }

    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('user_session');
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
